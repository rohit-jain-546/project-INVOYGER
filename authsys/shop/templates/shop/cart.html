<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/cart.css' %}">
</head>
<body>

<div class="cart-container">
    <h2>Your Cart</h2>

    <div class="cart-table">
        <div class="cart-header">
            <span>Product</span>
            <span>Price</span>
            <span>Qty</span>
            <span>Total</span>
            <span>Action</span>
        </div>

        <div class="cart-row">
            <span class="product-name">Laptop Bag</span>
            <span>₹1200</span>

            <div class="qty-box">
                <input type="number" value="1" min="1">
            </div>

            <span>₹1200</span>
            <a href="#" class="remove-btn">Remove</a>
        </div>

        <div class="cart-row">
            <span class="product-name">Wireless Mouse</span>
            <span>₹800</span>

            <div class="qty-box">
                <input type="number" value="2" min="1">
            </div>

            <span>₹1600</span>
            <a href="#" class="remove-btn">Remove</a>
        </div>
    </div>

    <div class="cart-summary">
        <h3>Total Amount</h3>
        <p>₹2800</p>
        <button class="checkout-btn">Proceed to Checkout</button>
    </div>
</div>

</body>
</html>
